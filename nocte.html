<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nocte</title>
<style>
:root{
  --bg:#0a0a0f;--card:#111118;--card2:#16161f;--border:#21212e;
  --accent:#f472b6;--accent2:#ec4899;
  --green:#34d399;--amber:#fbbf24;--blue:#60a5fa;--red:#f87171;--purple:#a78bfa;
  --text:#e8e8f0;--muted:#5a5a78;--muted2:#2e2e42;
  --gold:#f59e0b;--star-red:#ef4444;--star-blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:80px;}
input,select,textarea,button{font-family:inherit;font-size:14px;}
input,select,textarea{background:#1a1a26;border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;padding:9px 12px;width:100%;}
select option{background:#1a1a26;}
textarea{resize:vertical;}
button{cursor:pointer;}

/* ── Layout ── */
#hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 14px 0;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.logo{font-size:18px;font-weight:900;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.sync-dot{display:flex;align-items:center;gap:5px;font-size:11px;}
.sync-dot .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.sync-dot.ok .dot{background:var(--green);}
.sync-dot.saving .dot{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.err .dot{background:var(--red);}
.sync-dot.ok{color:var(--green);}
.sync-dot.saving{color:var(--amber);}
.sync-dot.err{color:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── Tabs ── */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:8px 10px 10px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;min-width:46px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.tab .ico{font-size:16px;}

/* ── Body ── */
#body{padding:14px;max-width:540px;margin:0 auto;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title .ico{font-size:16px;}

/* ── Form rows ── */
.fr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.fr label{min-width:88px;font-size:11px;color:var(--muted);flex-shrink:0;}
.fr .val{flex:1;font-size:13px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.fr input,.fr select{padding:6px 10px;font-size:13px;}
.fr .inp-sm{width:auto;}

/* ── Buttons ── */
.btn{border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:13px;width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));margin-top:10px;}
.btn-sm{border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;padding:6px 14px;background:linear-gradient(135deg,var(--accent2),var(--accent));cursor:pointer;}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;padding:10px 16px;cursor:pointer;}
.btn-danger{background:none;border:1px solid rgba(248,113,113,.3);border-radius:8px;color:var(--red);font-size:12px;padding:5px 12px;cursor:pointer;}
.btn-blue{background:none;border:1px solid rgba(96,165,250,.3);border-radius:8px;color:var(--blue);font-size:12px;padding:5px 12px;cursor:pointer;}
.btn-green{background:linear-gradient(135deg,var(--green),#059669);}

/* ── Chips ── */
.chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:12px;padding:5px 12px;cursor:pointer;}
.chip.active{background:rgba(244,114,182,.12);border-color:var(--accent2);color:var(--accent);font-weight:700;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}

/* ── Tags ── */
.tag{border-radius:20px;font-size:10px;padding:2px 8px;}
.tag-accent{background:rgba(244,114,182,.15);color:var(--accent);border:1px solid rgba(244,114,182,.3);}
.tag-green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3);}
.tag-amber{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.3);}
.tag-blue{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.3);}
.tag-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3);}
.tag-muted{background:var(--card2);color:var(--muted);border:1px solid var(--border);}

/* ── Toast ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(236,72,153,.4);transition:opacity .3s;pointer-events:none;}
#toast.hidden{opacity:0;}

/* ── Session card ── */
.sess-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.sess-time{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.sess-info{font-size:12px;color:var(--muted);}
.sess-money{text-align:right;}
.sess-takehome{font-size:20px;font-weight:700;color:var(--green);}
.sess-actions{display:flex;gap:8px;margin-top:10px;}

/* ── Reservation card ── */
.resv-card{border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid;}
.resv-pending{background:rgba(96,165,250,.05);border-color:rgba(96,165,250,.2);}
.resv-confirmed{background:rgba(52,211,153,.05);border-color:rgba(52,211,153,.2);}
.resv-arrived{background:rgba(244,114,182,.05);border-color:rgba(244,114,182,.2);}
.resv-cancelled{background:var(--card2);border-color:var(--border);opacity:.5;}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;}
.kpi label{font-size:10px;color:var(--muted);display:block;margin-bottom:4px;}
.kpi .val{font-size:17px;font-weight:700;}
.kpi-sm{background:var(--card2);border-radius:10px;padding:10px 12px;}
.kpi-sm label{font-size:9px;color:var(--muted);display:block;margin-bottom:3px;}
.kpi-sm .val{font-size:14px;font-weight:700;}

/* ── Progress bar ── */
.progress-wrap{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:6px 0;}
.progress-bar{height:100%;border-radius:4px;transition:width .8s ease;}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-dow{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;}
.cal-day{border-radius:8px;padding:4px 3px;min-height:56px;cursor:pointer;position:relative;background:var(--card2);}
.cal-day.empty{background:transparent;cursor:default;}
.cal-day.today{border:1px solid var(--accent);}
.cal-day .dn{font-size:11px;font-weight:600;margin-bottom:2px;}
.cal-day .dm{font-size:9px;color:var(--green);}
.cal-day .dc{font-size:9px;color:var(--muted);}
.cal-day.c0{background:var(--card2);}
.cal-day.c1{background:rgba(52,211,153,.08);}
.cal-day.c2{background:rgba(52,211,153,.15);}
.cal-day.c3{background:rgba(251,191,36,.12);}
.cal-day.c4{background:rgba(244,114,182,.15);}
.cal-day.resv-only{background:rgba(96,165,250,.07);}

/* ── Heaven star ── */
.star-bar{height:10px;background:var(--card2);border-radius:5px;overflow:hidden;}
.star-fill{height:100%;border-radius:5px;transition:width .8s;}

/* ── Heatmap ── */
.heatmap{display:grid;grid-template-columns:repeat(24,1fr);gap:1px;}
.hm-cell{height:20px;border-radius:2px;background:var(--card2);}
.hm-cell.h1{background:rgba(244,114,182,.2);}
.hm-cell.h2{background:rgba(244,114,182,.4);}
.hm-cell.h3{background:rgba(244,114,182,.7);}
.hm-cell.h4{background:var(--accent);}

/* ── Breakdown ── */
.breakdown{background:#0d0d14;border-radius:10px;padding:12px 14px;margin:10px 0;border:1px solid var(--border);}
.brow{display:flex;justify-content:space-between;padding:3px 0;}
.brow .bl{font-size:11px;color:var(--muted);}
.brow .br{font-size:12px;}
.brow.bold .br{font-weight:700;}
.brow.big .br{font-size:17px;font-weight:700;}
.divider{height:1px;background:var(--border);margin:6px 0;}

/* ── Report text ── */
.report-box{background:#131320;border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;font-family:monospace;color:var(--text);margin-bottom:10px;}

/* ── Empty ── */
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;line-height:2.4;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}

/* ── Section label ── */
.sec-label{font-size:10px;font-weight:700;color:var(--accent);margin:14px 0 5px;letter-spacing:.1em;text-transform:uppercase;}

/* ── Status badges ── */
.status-badge{border-radius:20px;font-size:10px;padding:2px 8px;font-weight:600;}
.s-pending{background:rgba(96,165,250,.15);color:var(--blue);}
.s-room_wait{background:rgba(251,191,36,.15);color:var(--amber);}
.s-confirmed{background:rgba(52,211,153,.15);color:var(--green);}
.s-arrived{background:rgba(244,114,182,.15);color:var(--accent);}
.s-cancelled{background:var(--card2);color:var(--muted);}

/* ── Queue badge ── */
#queue-badge{position:fixed;bottom:90px;right:16px;background:var(--red);color:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;z-index:99;display:none;}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;}
#loading .logo{font-size:32px;}
#loading p{color:var(--muted);font-size:13px;}
</style>
</head>

// CALC ENGINE
// ═══════════════════════════════════════════════════════════
function calcBack(s, settings) {
  const cfg = settings || DB.settings;
  // コース分
  let minutes = parseInt(s.courseMinutes) || 0;
  // 割引+分（includeBonusInBackの時のみ加算）
  if (s.includeBonusInBack && s.bonusMinutes) minutes += parseInt(s.bonusMinutes);
  // コースバック
  const courseBack = Math.max(0, (minutes - 10) * 100);
  // 指名バック
  const shimeiBack = s.shimeiType === '本指名' ? (cfg.honShimeiBack || 1000) : 0;
  // OPバック
  let opBack = 0;
  // 有料OP
  const paidOps = Array.isArray(s.paidOptions) ? s.paidOptions : [];
  paidOps.forEach(op => { opBack += cfg.paidOptions?.[op] || 0; });
  // 無料OP超過
  const extra = parseInt(s.extraOptionCount) || 0;
  const free  = parseInt(s.freeOptionCount)  || 0;
  if (extra > 0) {
    opBack += extra * (cfg.extraOptionBack || 500);
  } else {
    opBack += Math.max(0, free - (cfg.freeOptionThreshold || 1)) * (cfg.extraOptionBack || 500);
  }
  // 雑費前
  const subtotal = courseBack + shimeiBack + opBack;
  const zatsubi  = Math.round(subtotal * (cfg.zatsubiRate || 0.1));
  const takeHome = subtotal - zatsubi;
  const shopShare = Math.round((parseInt(s.sales) || 0) - takeHome);
  return { courseBack, shimeiBack, opBack, subtotal, zatsubi, takeHome, shopShare, minutes };
}

function lsSave(key, val) {
  try { localStorage.setItem(CFG.lsPrefix + key, JSON.stringify(val)); } catch(e) {}
}
function lsLoad(key, def) {
  try { const v = localStorage.getItem(CFG.lsPrefix + key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function saveDB() {
  lsSave('sessions', DB.sessions);
  lsSave('reservations', DB.reservations);
  lsSave('customers', DB.customers);
  lsSave('settings', DB.settings);
  lsSave('daily_shifts', DB.daily_shifts);
}

// ═══════════════════════════════════════════════════════════
// WEBHOOK / SYNC
// ═══════════════════════════════════════════════════════════
function setSyncStatus(status, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot) return;
  dot.className = 'sync-dot ' + status;
  lbl.textContent = label || { ok:'保存済', saving:'保存中…', err:'保存失敗', idle:'--' }[status] || '--';
}

async function webhookPost(action, payload) {
  const url = DB.settings.webhookUrl || '';
  if (!url) { setSyncStatus('idle'); return false; }
  setSyncStatus('saving');
  try {
    // GASはCORSのpreflightに対応していないためno-corsとformデータで送信
    const form = new FormData();
    form.append('data', JSON.stringify({ action, payload }));
    await fetch(url, { method: 'POST', body: form, mode: 'no-cors' });
    // no-corsはレスポンスが読めないので成功とみなす
    setSyncStatus('ok');
    return true;
  } catch(e) {
    setSyncStatus('err');
    addToQueue(action, payload);
    return false;
  }
}

function addToQueue(action, payload) {
  syncQueue.push({ action, payload, ts: Date.now() });
  localStorage.setItem('nocte_queue', JSON.stringify(syncQueue));
  updateQueueBadge();
}

function updateQueueBadge() {
  const badge = document.getElementById('queue-badge');
  const cnt = document.getElementById('queue-count');
  if (syncQueue.length > 0) {
    badge.style.display = 'block';
    cnt.textContent = syncQueue.length;
  } else {
    badge.style.display = 'none';
  }
}

async function retryQueue() {
  const url = DB.settings.webhookUrl || '';
  if (!url || !syncQueue.length) return;
  const failed = [];
  for (const item of syncQueue) {
    try {
      const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action: item.action, payload: item.payload }) });
      const data = await res.json();
      if (data.status !== 'ok') failed.push(item);
    } catch { failed.push(item); }
  }
  syncQueue = failed;
  localStorage.setItem('nocte_queue', JSON.stringify(syncQueue));
  updateQueueBadge();
  flash(failed.length === 0 ? '再送完了 ✓' : `${failed.length}件失敗`);
}

function showQueue() {
  openModal(`
    <div class="modal-title">📤 未送信キュー (${syncQueue.length}件)</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Webhookへの送信に失敗したデータが${syncQueue.length}件あります</p>
    ${syncQueue.slice(0,5).map(q=>`<div class="sess-card" style="font-size:11px;margin-bottom:6px;"><b>${q.action}</b><br>${new Date(q.ts).toLocaleString()}</div>`).join('')}
    <button class="btn" onclick="retryQueue();closeModal()">🔄 全件再送</button>
    <button class="btn-ghost" style="width:100%;margin-top:8px;" onclick="if(confirm('キューをクリアしますか？')){syncQueue=[];localStorage.setItem('nocte_queue',JSON.stringify([]));updateQueueBadge();closeModal();}">🗑 クリア</button>
  `);
}

async function loadFromWebhook() {
  const url = DB.settings.webhookUrl || '';
  if (!url) return false;
  setSyncStatus('saving', '読込中…');
  try {
    const res = await fetch(url, { mode: 'cors' });
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message);
    const d = data.data;
    if (d.sessions?.length)     DB.sessions     = d.sessions;
    if (d.reservations?.length) DB.reservations = d.reservations;
    if (d.customers?.length)    DB.customers    = d.customers;
    // settings from sheet
    if (d.settings?.length) {
      d.settings.forEach(row => {
        const k = row.key; let v = row.value;
        try { v = JSON.parse(v); } catch {}
        DB.settings[k] = v;
      });
    }
    if (d.daily_shifts?.length) {
      d.daily_shifts.forEach(s => { DB.daily_shifts[s.date] = { shiftStart: s.shiftStart, shiftEnd: s.shiftEnd, note: s.note }; });
    }
    saveDB();
    setSyncStatus('ok');
    return true;
  } catch(e) {
    setSyncStatus('err');
    return false;
  }
}

function toMin(t) { if(!t) return 0; const[h,m]=t.split(':').map(Number); return h*60+m; }
function minDiff(a,b) { let d=toMin(b)-toMin(a); if(d<0)d+=1440; return d; }
function minToH(m) { return (m/60).toFixed(1); }

// ═══════════════════════════════════════════════════════════
// LINE PARSER
// ═══════════════════════════════════════════════════════════
function parseLine(txt) {
  const g = key => { const m = txt.match(new RegExp('■' + key + '[\\s：:]+([^\n■]+)')); return m ? m[1].trim() : ''; };
  const dt = g('日時'); let date='', st='', et='';
  const dm = dt.match(/(\d{2})\/(\d{2})[^\s　]*[\s　]+(\d{2}:\d{2})-(\d{2}:\d{2})/);
  if (dm) { date = new Date().getFullYear() + '-' + dm[1] + '-' + dm[2]; st = dm[3]; et = dm[4]; }
  const pr = g('料金合計'); let sales = 0;
  const pm=pr.match(/(\d+)万(\d+)/), p1=pr.match(/^(\d+)万/), p2=pr.match(/(\d+)/);
  if(pm)sales=parseInt(pm[1])*10000+parseInt(pm[2]); else if(p1)sales=parseInt(p1[1])*10000; else if(p2)sales=parseInt(p2[1]);
  const courseRaw = g('コース').replace(/分.*/,'');
  const waribiki  = g('割引');
  const optRaw    = g('オプション');
  const nameRaw   = g('名前');
  const name      = nameRaw.split('（')[0].trim() || nameRaw;
  // parse options
  let freeOpts=0, extraOpts=0;
  const paidOpts=[];
  if (optRaw) {
    optRaw.split(',').map(s=>s.trim()).filter(Boolean).forEach(o => {
      const em = o.match(/追加OP(\d+)個/);
      if(em){extraOpts+=parseInt(em[1]);return;}
      if(Object.keys(DB.settings.paidOptions||{}).some(k=>o.includes(k))){paidOpts.push(o);return;}
      freeOpts++;
    });
  }
  // bonus
  let bonusMin=0, includeBonus=false;
  if (waribiki) {
    const bm = waribiki.match(/\+(\d+)分/);
    if(bm) bonusMin=parseInt(bm[1]);
    // バック反映しない割引でなければ含む
    if(!DISCOUNT_NO_BACK.some(p=>waribiki.includes(p))) includeBonus=true;
    // 出勤一番/スタート枠は+20分固定
    if(DISCOUNT_20MIN.some(p=>waribiki.includes(p))) { bonusMin=20; includeBonus=true; }
  }
  const isHeaven = txt.includes('ヘブン') || txt.toLowerCase().includes('heaven');
  return {
    date, startTime:st, endTime:et, sales,
    hotel:g('ホテル'), room:g('部屋番'),
    courseMinutes: parseInt(courseRaw)||0,
    shimeiType: g('指名') || '写真指名',
    discountType: waribiki,
    bonusMinutes: bonusMin,
    includeBonusInBack: includeBonus,
    freeOptionCount: freeOpts,
    extraOptionCount: extraOpts,
    paidOptions: paidOpts,
    memo: g('予約メモ'),
    isHeaven,
    customerName: name,
    driver: g('送りドライバー'),
    optionText: optRaw,
  };
}

  openModal(`

async function setResvStatus(id, status) {
  const idx = DB.reservations.findIndex(x => x.id===id);
  if (idx<0) return;
  DB.reservations[idx].status = status;
  DB.reservations[idx].updatedAt = new Date().toISOString();
  saveDB(); renderResv();
  await webhookPost('updateReservation', DB.reservations[idx]);
  flash('状態を更新しました');
}

async function convertToSession(resvId) {
  const r = DB.reservations.find(x => x.id===resvId);
  if (!r) return;
  // 実績フォームを開く（予約データを初期値として）
  openSessionForm({ ...r, id: uid(), createdAt: new Date().toISOString() }, resvId);
}

async function deleteResv(id) {
  if (!confirm('予約を削除しますか？')) return;
  DB.reservations = DB.reservations.filter(x => x.id!==id);
  saveDB(); renderResv();
  await webhookPost('deleteReservation', { id });
  flash('削除しました');
}

function showBreakdown(id) {

async function deleteSession(id) {
  if (!confirm('実績を削除しますか？')) return;
  DB.sessions = DB.sessions.filter(x => x.id!==id);
  saveDB(); renderSess();
  await webhookPost('deleteSession', { id });
  flash('削除しました');
}

async function saveSessionForm(id, fromResvId) {
  const course = parseInt(document.getElementById('sf-course')?.value)||0;
  const sales  = parseInt(document.getElementById('sf-sales')?.value)||0;
  const shimei = document.querySelector('.sf-shimei.active')?.dataset.val||'写真指名';
  const discount = document.getElementById('sf-discount')?.value||'';
  const bonus = parseInt(document.getElementById('sf-bonus')?.value)||0;
  const includeBonus = document.getElementById('sf-include-bonus')?.checked||false;
  const freeOp = parseInt(document.getElementById('sf-free-op')?.value)||0;
  const extraOp = parseInt(document.getElementById('sf-extra-op')?.value)||0;
  const paidOps = [...document.querySelectorAll('#sf-paid-ops .chip.active')].map(b=>b.dataset.val);
  const custId = document.getElementById('sf-cust')?.value||'';
  const hotel  = document.getElementById('sf-hotel')?.value||'';
  const room   = document.getElementById('sf-room')?.value||'';
  const heaven = document.getElementById('sf-heaven')?.checked||false;
  const memo   = document.getElementById('sf-memo')?.value||'';
  const actualShop = parseInt(document.getElementById('sf-actual-shop')?.value)||null;
  const date   = document.getElementById('sf-date')?.value||today();
  const st     = document.getElementById('sf-st')?.value||'';
  const et     = document.getElementById('sf-et')?.value||'';

  const b = calcBack({ courseMinutes:course, discountType:discount, bonusMinutes:bonus, includeBonusInBack:includeBonus, freeOptionCount:freeOp, extraOptionCount:extraOp, paidOptions:paidOps, shimeiType:shimei });

  const actualTH = actualShop!=null ? sales - actualShop : null;
  const cust = custId ? custById(custId) : null;

  const rec = {
    id, date, startTime:st, endTime:et,
    customerId:custId, customerName: cust?.name||'',
    hotel, room, courseMinutes:course, sales, shimeiType:shimei,
    discountType:discount, bonusMinutes:bonus, includeBonusInBack:includeBonus,
    freeOptionCount:freeOp, extraOptionCount:extraOp, paidOptions:paidOps,
    memo, isHeaven:heaven,
    predictedBack:b.subtotal, predictedTakeHome:b.takeHome, predictedShopShare:b.zatsubi,
    actualShopShare:actualShop, actualTakeHome:actualTH,
    variance: actualTH!=null ? actualTH - b.takeHome : null,
    calcStatus: actualShop!=null ? 'actual' : 'predicted',
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
  };

  const existing = DB.sessions.findIndex(x=>x.id===id);
  if (existing>=0) DB.sessions[existing]=rec; else DB.sessions.push(rec);

  // Convert from reservation if needed
  if (fromResvId) {
    DB.reservations = DB.reservations.filter(x=>x.id!==fromResvId);
    await webhookPost('convertReservation', { reservationId:fromResvId, sessionData:rec });
  } else {
    await webhookPost(existing>=0?'updateSession':'addSession', rec);
  }

  // Update customer stats
  if (custId) updateCustStats(custId);

  saveDB(); closeModal(); renderSess(); renderDash();
  flash('保存しました ✓');
}

function editSession(id) {
  const s = DB.sessions.find(x=>x.id===id);
  if(s) openSessionForm(s);
}

function updateCustStats(custId) {
  const idx = DB.customers.findIndex(c=>c.id===custId);
  if(idx<0) return;
  const visits = DB.sessions.filter(s=>s.customerId===custId);
  DB.customers[idx].totalVisits = visits.length;
  DB.customers[idx].totalSales  = visits.reduce((a,s)=>a+(parseInt(s.sales)||0),0);
  DB.customers[idx].totalTakeHome = visits.reduce((a,s)=>a+(s.predictedTakeHome||0),0);
  DB.customers[idx].averageUnitPrice = visits.length ? Math.round(DB.customers[idx].totalSales/visits.length) : 0;
  DB.customers[idx].lastVisit = visits.sort((a,b)=>b.date.localeCompare(a.date))[0]?.date || '';
}

function renderCal() {
  const el = document.getElementById('tab-cal');
  const [year, month] = calMonth.split('-').map(Number);
  const first = new Date(year, month-1, 1);
  const last  = new Date(year, month, 0);
  const startDow = first.getDay();

  // Build day data
  const dayData = {};
  DB.sessions.filter(s=>s.date.slice(0,7)===calMonth).forEach(s=>{
    const d=s.date; if(!dayData[d]) dayData[d]={th:0,n:0,hv:0,hasResv:false};
    dayData[d].th+=s.predictedTakeHome||0; dayData[d].n++; if(s.isHeaven)dayData[d].hv++;
  });
  DB.reservations.filter(r=>r.date.slice(0,7)===calMonth&&r.status!=='cancelled').forEach(r=>{
    const d=r.date; if(!dayData[d]) dayData[d]={th:0,n:0,hv:0,hasResv:false};
    dayData[d].hasResv=true;
  });

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push('<div class="cal-day empty"></div>');
  for(let d=1;d<=last.getDate();d++){
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd = dayData[dateStr];
    const isToday = dateStr===today();
    let cls = 'c0';
    if(dd?.th>=40000) cls='c4'; else if(dd?.th>=30000) cls='c3'; else if(dd?.th>=20000) cls='c2'; else if(dd?.th>0) cls='c1';
    else if(dd?.hasResv) cls='resv-only';
    const dow_ = (startDow+d-1)%7;
    const dowColor = dow_===0?'var(--red)':dow_===6?'var(--blue)':'';
    cells.push(`<div class="cal-day ${cls}${isToday?' today':''}" onclick="openDayDetail('${dateStr}')">
      <div class="dn" style="${dowColor?'color:'+dowColor:''}">${d}</div>
      ${dd?.th>0?`<div class="dm">${fmtY(dd.th)}</div><div class="dc">${dd.n}本${dd.hv>0?' ⭐'+dd.hv:''}</div>`:''}
      ${!dd?.th&&dd?.hasResv?'<div style="font-size:9px;color:var(--blue);">予約</div>':''}
    </div>`);
  }

  el.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <button class="btn-ghost" style="padding:8px 14px;" onclick="calMonth=new Date(new Date(calMonth+'-01').setMonth(new Date(calMonth+'-01').getMonth()-1)).toISOString().slice(0,7);renderCal()">‹ 前月</button>

function openDayDetail(date) {
  const ss = sessionsForDate(date);
  const rs = resvForDate(date);
  const shift = getShift(date);
  const kosoku = minDiff(shift.shiftStart, shift.shiftEnd);
  const sessMin = ss.reduce((a,s)=>a+minDiff(s.startTime,s.endTime||s.startTime),0);
  const taiki = Math.max(0, kosoku - sessMin);
  const kadoritsu = kosoku>0 ? Math.round(sessMin/kosoku*100) : 0;
  const th = ss.reduce((a,s)=>a+(s.predictedTakeHome||0),0);
  const sales = ss.reduce((a,s)=>a+(parseInt(s.sales)||0),0);
  const kosokuH = kosoku/60; const sessH = sessMin/60;

  openModal(`
    <div class="modal-title">📅 ${date.replace(/-/g,'/')} (${dow(date)})</div>
    ${ss.length>0?`
    <div class="kpi-grid-3" style="margin-bottom:12px;">
      ${[['接客時間',minToH(sessMin)+'h','var(--blue)'],['拘束時間',minToH(kosoku)+'h','var(--text)'],
         ['待機時間',minToH(taiki)+'h','var(--muted)'],['稼働率',kadoritsu+'%',kadoritsu>=70?'var(--green)':'var(--amber)'],
         ['拘束時給',fmtY(kosokuH>0?Math.round(th/kosokuH):0),'var(--purple)'],['接客時給',fmtY(sessH>0?Math.round(th/sessH):0),'var(--green)'],
      ].map(([l,v,c])=>`<div class="kpi-sm"><label>${l}</label><div class="val" style="color:${c}">${v}</div></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:10px;">
      <div><div style="font-size:12px;color:var(--muted);">${ss.length}本 · 売上 ${fmtY(sales)}</div></div>
      <div style="text-align:right;"><div style="font-size:11px;color:var(--accent);">手取り</div><div style="font-size:22px;font-weight:700;color:var(--green);">${fmtY(th)}</div></div>
    </div>
    ${ss.map(s=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <div>
        <div style="font-weight:600;">${s.startTime}〜${s.endTime||''} ${s.isHeaven?'⭐':''}</div>
        <div style="font-size:11px;color:var(--muted);">${s.courseMinutes}分 · ${s.shimeiType} · ${s.customerName||'--'}</div>
        ${s.hotel?`<div style="font-size:11px;color:var(--muted);">${s.hotel}${s.room?' #'+s.room:''}</div>`:''}
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;color:var(--muted);">${fmtY(s.sales)}</div>
        <div style="font-weight:700;color:var(--green);">${fmtY(s.predictedTakeHome)}</div>
      </div>
    </div>`).join('')}
    <button class="btn" style="margin-top:12px;" onclick="closeModal();openReport('${date}')">📤 報告文生成</button>`
    :`<div style="color:var(--muted);font-size:13px;margin-bottom:12px;">実績なし</div>`}
    ${rs.length>0?`
    <div style="margin-top:12px;">
      <div style="font-size:12px;color:var(--amber);margin-bottom:8px;">未消化予約 ${rs.length}件</div>
      ${rs.map(r=>`<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);">${r.startTime} ${r.customerName||''} ${r.courseMinutes}分 ${statusBadge(r.status)}</div>`).join('')}

  const idx = DB.customers.findIndex(c=>c.id===id);
  if(idx<0) return;
  DB.customers[idx].memo  = memo;
  DB.customers[idx].notes = notes;
  DB.customers[idx].updatedAt = new Date().toISOString();
  saveDB();
  await webhookPost('updateCustomer', DB.customers[idx]);
  flash('メモを保存しました ✓');
}

async function toggleCustTag(id, tag, btn) {
  btn.classList.toggle('active');
  const idx = DB.customers.findIndex(c=>c.id===id);
  if(idx<0) return;
  const prefs = DB.customers[idx].preferences || [];
  if(prefs.includes(tag)) {
    DB.customers[idx].preferences = prefs.filter(p=>p!==tag);
  } else {
    DB.customers[idx].preferences = [...prefs, tag];
  }
  DB.customers[idx].updatedAt = new Date().toISOString();
  saveDB();
  await webhookPost('updateCustomer', DB.customers[idx]);
}

async function saveCustForm(id, isNew) {
  const name = document.getElementById('cf-name')?.value?.trim()||'';
  if(!name){flash('名前を入力してください');return;}
  const media = [...document.querySelectorAll('.cf-media.active')].map(b=>b.dataset.val);
  const prefs = [...document.querySelectorAll('.cf-pref.active')].map(b=>b.dataset.val);
  const existing = DB.customers.findIndex(x=>x.id===id);
  const base = existing>=0 ? DB.customers[existing] : { id, customerNo:nextCustNo(), totalVisits:0, totalSales:0, totalTakeHome:0, averageUnitPrice:0, lastVisit:'' };
  const rec = { ...base, name, media, preferences:prefs,
    heavenName: document.getElementById('cf-heaven-name')?.value||'',
    memo: document.getElementById('cf-memo')?.value||'',
    notes: document.getElementById('cf-notes')?.value||'',

async function deleteCust(id) {
  DB.customers = DB.customers.filter(x=>x.id!==id);
  saveDB(); closeModal(); renderCust();
  await webhookPost('deleteCustomer', {id});
  flash('削除しました');
}

function renderAna() {
  const el = document.getElementById('tab-ana');
  const [year, month] = calMonth.split('-').map(Number);
  const ym = calMonth;
  const monthSess = DB.sessions.filter(s=>s.date.slice(0,7)===ym);
  const allMonths = [...new Set(DB.sessions.map(s=>s.date.slice(0,7)))].sort().reverse();

  // Monthly tabs
  el.innerHTML = `
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
    <button class="btn-ghost" style="padding:8px 14px;" onclick="calMonth=new Date(new Date(calMonth+'-01').setMonth(new Date(calMonth+'-01').getMonth()-1)).toISOString().slice(0,7);renderAna()">‹</button>

    <button class="btn-ghost" style="padding:8px 14px;" onclick="calMonth=new Date(new Date(calMonth+'-01').setMonth(new Date(calMonth+'-01').getMonth()+1)).toISOString().slice(0,7);renderAna()">›</button>
  </div>
  <div id="ana-content"></div>`;

  const ana = document.getElementById('ana-content');
  if(!monthSess.length){ana.innerHTML='<div class="empty">この月のデータがありません</div>';return;}

  const th = monthSess.reduce((a,s)=>a+(s.predictedTakeHome||0),0);
  const sales = monthSess.reduce((a,s)=>a+(parseInt(s.sales)||0),0);
  const shopShare = sales - th;
  const hv = monthSess.filter(s=>s.isHeaven).length;
  const hvRate = monthSess.length>0?Math.round(hv/monthSess.length*100):0;
  const workDays = [...new Set(monthSess.map(s=>s.date))].length;
  const goal = DB.settings.monthGoal||300000;
  const goalPct = Math.min(100,Math.round(th/goal*100));

  // Shift stats
  const totalSessMin = monthSess.reduce((a,s)=>a+minDiff(s.startTime,s.endTime||s.startTime),0);
  const dates = [...new Set(monthSess.map(s=>s.date))];
  let totalKosokuMin=0;
  dates.forEach(d=>{ const sh=getShift(d); totalKosokuMin+=minDiff(sh.shiftStart,sh.shiftEnd); });
  const kadoritsu = totalKosokuMin>0?Math.round(totalSessMin/totalKosokuMin*100):0;
  const totalH = totalSessMin/60;
  const kosokuH = totalKosokuMin/60;

  // Weekday analysis
  const byDow = {};
  DAYS.forEach(d=>{byDow[d]={n:0,th:0,h:0};});
  monthSess.forEach(s=>{const d=dow(s.date);byDow[d].n++;byDow[d].th+=s.predictedTakeHome||0;byDow[d].h+=minDiff(s.startTime,s.endTime||s.startTime)/60;});
  const maxDowTH = Math.max(...DAYS.map(d=>byDow[d].n>0?Math.round(byDow[d].th/byDow[d].n):0),1);

  // Hour heatmap
  const heatmap = new Array(24).fill(0);
  monthSess.forEach(s=>{
    if(!s.startTime||!s.endTime)return;
    const st=toMin(s.startTime); const et=toMin(s.endTime);
    for(let m=st;m<et;m+=30){ const h=Math.floor(m/60)%24; if(h<24)heatmap[h]++; }
  });
  const maxH = Math.max(...heatmap,1);

  ana.innerHTML = `
  <!-- 月次KPI -->
  <div class="card">
    <div class="card-title"><span class="ico">📊</span>月次サマリ</div>
    <div class="kpi-grid">
      <div class="kpi" style="background:rgba(244,114,182,.08);border-color:rgba(244,114,182,.25);"><label>手取り</label><div class="val" style="color:var(--accent)">${fmtY(th)}</div></div>
      <div class="kpi"><label>月目標比</label><div class="val" style="color:${goalPct>=100?'var(--green)':'var(--text)'}">${goalPct}%</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${goalPct}%;background:linear-gradient(90deg,var(--accent2),var(--green))"></div></div>
    <div class="kpi-grid-3" style="margin-top:10px;">
      ${[['本数',monthSess.length+'本','var(--blue)'],['客払い',fmtY(sales),'var(--text)'],['店落ち',fmtY(shopShare),'var(--amber)'],
         ['出勤日数',workDays+'日','var(--text)'],['ヘブン',hv+'本 ('+hvRate+'%)','var(--gold)'],['平均客単価',fmtY(Math.round(sales/(monthSess.length||1))),'var(--purple)'],
      ].map(([l,v,c])=>`<div class="kpi-sm"><label>${l}</label><div class="val" style="color:${c}">${v}</div></div>`).join('')}
    </div>
  </div>

  <!-- 稼働分析 -->
  <div class="card">
    <div class="card-title"><span class="ico">⏱️</span>稼働分析</div>
    <div class="kpi-grid-3">
      ${[['接客時間',minToH(totalSessMin)+'h','var(--blue)'],['拘束時間',minToH(totalKosokuMin)+'h','var(--text)'],['稼働率',kadoritsu+'%',kadoritsu>=70?'var(--green)':'var(--amber)'],
         ['接客時給',fmtY(totalH>0?Math.round(th/totalH):0),'var(--green)'],['拘束時給',fmtY(kosokuH>0?Math.round(th/kosokuH):0),'var(--purple)'],['平均手取り',fmtY(workDays>0?Math.round(th/workDays):0),'var(--text)'],
      ].map(([l,v,c])=>`<div class="kpi-sm"><label>${l}</label><div class="val" style="color:${c}">${v}</div></div>`).join('')}
    </div>
  </div>

  <!-- 曜日別 -->
  <div class="card">
    <div class="card-title"><span class="ico">📆</span>曜日別分析</div>
    ${DAYS.map((d,i)=>{
      const dd=byDow[d]; const avg=dd.n>0?Math.round(dd.th/dd.n):0;
      const pct=maxDowTH>0?Math.min(100,avg/maxDowTH*100):0;
      const col=i===0?'var(--red)':i===6?'var(--blue)':'var(--text)';
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="width:22px;font-size:12px;font-weight:700;color:${col}">${d}</div>
        <div style="flex:1;height:18px;background:var(--card2);border-radius:4px;overflow:hidden;">
          <div style="height:100%;border-radius:4px;width:${pct}%;background:linear-gradient(90deg,var(--accent2),var(--accent));"></div>
        </div>
        <div style="width:100px;text-align:right;font-size:11px;">
          ${avg>0?`<span style="color:var(--green);font-weight:700;">${fmtY(avg)}</span><span style="color:var(--muted);"> /${dd.n}本</span>`:'<span style="color:var(--muted);">—</span>'}
        </div>
      </div>`;
    }).join('')}
  </div>

  <!-- 時間帯ヒートマップ -->
  <div class="card">
    <div class="card-title"><span class="ico">🕐</span>時間帯ヒートマップ</div>
    <div style="display:flex;gap:1px;margin-bottom:4px;">
      ${heatmap.map((v,i)=>{
        const pct=v/maxH; const cls=pct>0.75?'h4':pct>0.5?'h3':pct>0.25?'h2':v>0?'h1':'';
        return `<div class="hm-cell ${cls}" title="${i}時: ${v}件" style="flex:1;"></div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);">
      <span>0時</span><span>6時</span><span>12時</span><span>18時</span><span>24時</span>
    </div>
    <div style="margin-top:10px;">
      ${[['11-14時',11,14],['14-17時',14,17],['17-18時',17,18],['18-22時',18,22]].map(([label,from,to])=>{
        const cnt=heatmap.slice(from,to).reduce((a,v)=>a+v,0);
        return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border);">
          <span>${label}</span><span style="color:var(--blue);font-weight:700;">${cnt}コマ</span>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- 全月別 -->
  <div class="card">
    <div class="card-title"><span class="ico">📅</span>月別推移</div>
    ${allMonths.map(m=>{
      const ss=DB.sessions.filter(s=>s.date.slice(0,7)===m);
      const mTH=ss.reduce((a,s)=>a+(s.predictedTakeHome||0),0);
      const mHV=ss.filter(s=>s.isHeaven).length;
      const sr=mHV>=20?{l:'金★',c:'var(--gold)'}:mHV>=10?{l:'赤★',c:'var(--star-red)'}:mHV>=5?{l:'青★',c:'var(--star-blue)'}:{l:'',c:''};
      const maxTH=Math.max(...allMonths.map(x=>DB.sessions.filter(s=>s.date.slice(0,7)===x).reduce((a,s)=>a+(s.predictedTakeHome||0),0)),1);
      return `<div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-weight:700;">${m.replace('-','年')}月</span>
            ${sr.l?`<span style="font-size:11px;color:${sr.c};font-weight:700;">${sr.l}(${mHV}本)</span>`:''}
          </div>
          <span style="color:var(--green);font-weight:700;">${fmtY(mTH)}</span>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${ss.length}本</div>
        <div class="progress-wrap" style="height:4px;"><div class="progress-bar" style="width:${mTH/maxTH*100}%;background:linear-gradient(90deg,var(--accent2),var(--green))"></div></div>
      </div>`;
    }).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// TAB: SETTINGS
// ═══════════════════════════════════════════════════════════
function renderCfg() {
  const el = document.getElementById('tab-cfg');
  const s = DB.settings;
  el.innerHTML = `
  <div class="card">
    <div class="card-title"><span class="ico">🔗</span>Google Sheets 連携</div>
    <div class="fr"><label>Webhook URL</label><div class="val"><input type="text" id="cfg-webhook" value="${s.webhookUrl||''}" placeholder="https://script.google.com/..."></div></div>
    <button class="btn" onclick="testAndSaveWebhook()">接続テスト & 保存</button>
    <button class="btn" style="background:linear-gradient(135deg,#059669,var(--green));margin-top:8px;" onclick="syncFromSheet()">📥 スプシから全データ読込</button>
    <button class="btn" style="background:linear-gradient(135deg,var(--blue),var(--purple));margin-top:8px;" onclick="bulkExportToSheet()">📤 全データをスプシへ送信</button>
  </div>

  <div class="card">
    <div class="card-title"><span class="ico">💰</span>バック設定</div>
    <div class="fr"><label>月目標(円)</label><div class="val"><input type="number" id="cfg-goal" value="${s.monthGoal||300000}"></div></div>
    <div class="fr"><label>本指バック(円)</label><div class="val"><input type="number" id="cfg-hon" value="${s.honShimeiBack||1000}"></div></div>
    <div class="fr"><label>無料OP閾値</label><div class="val"><input type="number" id="cfg-free-thr" value="${s.freeOptionThreshold||1}"></div></div>
    <div class="fr"><label>超過OP単価(円)</label><div class="val"><input type="number" id="cfg-extra-op" value="${s.extraOptionBack||500}"></div></div>
    <div class="fr"><label>雑費率</label><div class="val"><input type="number" id="cfg-zatsubi" value="${(s.zatsubiRate||0.1)*100}" step="1"> %</div></div>
    <button class="btn" onclick="saveSettings()">設定を保存</button>
  </div>

  <div class="card">
    <div class="card-title"><span class="ico">💳</span>有料オプション設定</div>
    ${Object.entries(s.paidOptions||{顔射:1000,写メ:1000,ムービー:2000,ごっくん:2000,AF:5000}).map(([k,v])=>`
    <div class="fr"><label>${k}</label><div class="val"><input type="number" id="po-${k}" value="${v}"> 円</div></div>`).join('')}
    <button class="btn" onclick="savePaidOpts()">OP設定を保存</button>
  </div>

  <div class="card">
    <div class="card-title"><span class="ico">📤</span>未送信キュー</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">未送信: <b id="cfg-queue-cnt">${syncQueue.length}</b>件</div>
    <button class="btn" onclick="retryQueue()" ${syncQueue.length===0?'disabled':''}>🔄 再送</button>
  </div>

  <div class="card">
    <div class="card-title"><span class="ico">🗑️</span>データ管理</div>
    <button class="btn-danger" style="width:100%;" onclick="if(confirm('全データをリセットします。よろしいですか？')){resetAll();}">全データリセット</button>
  </div>`;
}

async function testAndSaveWebhook() {
  const url = document.getElementById('cfg-webhook')?.value?.trim()||'';
  if(!url){flash('URLを入力してください');return;}
  DB.settings.webhookUrl = url;
  saveDB();
  try{
    setSyncStatus('saving','テスト中…');
    const form = new FormData();
    form.append('data', JSON.stringify({action:'ping',payload:{}}));
    await fetch(url, {method:'POST', body:form, mode:'no-cors'});
    setSyncStatus('ok'); flash('接続成功 ✓ (保存開始)');
  }catch(e){setSyncStatus('err');flash('接続失敗: '+e.message);}
}

async function syncFromSheet() {
  const ok = await loadFromWebhook();
  if(ok){renderAll();flash('スプシから読み込みました ✓');}
  else flash('読み込み失敗');
}

async function bulkExportToSheet() {
  if(!DB.settings.webhookUrl){flash('Webhook URLを設定してください');return;}
  setSyncStatus('saving');
  try{
    const form = new FormData();
    form.append('data', JSON.stringify({action:'bulkImport',payload:{sessions:DB.sessions,reservations:DB.reservations,customers:DB.customers,settings:DB.settings,daily_shifts:Object.entries(DB.daily_shifts).filter(([k])=>k!=='default').map(([date,s])=>({date,...s}))}}));
    await fetch(DB.settings.webhookUrl, {method:'POST', body:form, mode:'no-cors'});
    setSyncStatus('ok'); flash('全データを送信しました ✓');
  }catch(e){setSyncStatus('err');flash('送信失敗: '+e.message);}
}

async function saveSettings() {
  DB.settings.monthGoal = parseInt(document.getElementById('cfg-goal')?.value)||300000;
  DB.settings.honShimeiBack = parseInt(document.getElementById('cfg-hon')?.value)||1000;
  DB.settings.freeOptionThreshold = parseInt(document.getElementById('cfg-free-thr')?.value)||1;
  DB.settings.extraOptionBack = parseInt(document.getElementById('cfg-extra-op')?.value)||500;
  DB.settings.zatsubiRate = (parseInt(document.getElementById('cfg-zatsubi')?.value)||10)/100;
  saveDB();
  await webhookPost('updateSettings', DB.settings);
  flash('設定を保存しました ✓');
}

async function savePaidOpts() {
  const opts = {};
  Object.keys(DB.settings.paidOptions||{}).forEach(k=>{
    const el = document.getElementById('po-'+k);
    if(el) opts[k] = parseInt(el.value)||0;
  });
  DB.settings.paidOptions = opts;
  saveDB();
  await webhookPost('updateSettings', DB.settings);
  flash('OP設定を保存しました ✓');
}

function resetAll() {
  DB.sessions = INIT_SESSIONS;
  DB.customers = INIT_CUSTOMERS;
  DB.reservations = [];
  DB.settings = { ...INITIAL_SETTINGS };
  DB.daily_shifts = { ...INITIAL_SHIFTS };
  saveDB(); renderAll();
  flash('リセットしました');
}

// ═══════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════
function setTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===id));
  document.querySelectorAll('.tab-content').forEach(c=>{ c.style.display = c.id==='tab-'+id?'':'none'; });
  renderTab(id);
}

function renderTab(id) {
  switch(id){
    case 'dash':  renderDash(); break;
    case 'resv':  renderResv(); break;
    case 'sess':  renderSess(); break;
    case 'cal':   renderCal();  break;
    case 'cust':  renderCust(); break;
    case 'ana':   renderAna();  break;
    case 'cfg':   renderCfg();  break;
  }
}

function renderAll() {
  renderTab(currentTab);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  // Load from localStorage
  DB.sessions     = lsLoad('sessions',     INIT_SESSIONS);
  DB.customers    = lsLoad('customers',    INIT_CUSTOMERS);
  DB.reservations = lsLoad('reservations', []);
  DB.settings     = { ...INITIAL_SETTINGS, ...lsLoad('settings', {}) };
  DB.daily_shifts = { ...INITIAL_SHIFTS,   ...lsLoad('daily_shifts', {}) };

  // Try to load from webhook
  if (DB.settings.webhookUrl) {
    await loadFromWebhook();
  } else {
    setSyncStatus('idle');
  }

  // Hide loading, show app
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Tab routing
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', () => setTab(t.dataset.tab));
  });

  updateQueueBadge();
  renderDash();
}

init();
</script>
